<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" fill="none">
  <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }</style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5a5a5a"/>
    </marker>
    <marker id="arrow-feedback" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#9a9a9a"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#00000008"/></filter>
  </defs>
  <rect width="960" height="620" rx="12" fill="#f8f6f3"/>
  <text x="480" y="38" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="700" letter-spacing="1.5">SYSTEM ARCHITECTURE</text>
  <line x1="320" y1="50" x2="640" y2="50" stroke="#d8d4ce" stroke-width="1"/>

  <!-- Column headers -->
  <rect x="40" y="75" width="280" height="420" rx="8" fill="#f8f6f3" stroke="#d8d4ce" stroke-width="1"/>
  <rect x="340" y="75" width="280" height="420" rx="8" fill="#f8f6f3" stroke="#d8d4ce" stroke-width="1"/>
  <rect x="640" y="75" width="280" height="420" rx="8" fill="#f8f6f3" stroke="#d8d4ce" stroke-width="1"/>

  <text x="180" y="105" text-anchor="middle" fill="#4a4a4a" font-size="14" font-weight="700" letter-spacing="1.5">AGENT</text>
  <text x="480" y="105" text-anchor="middle" fill="#4a4a4a" font-size="14" font-weight="700" letter-spacing="1.5">BACKEND</text>
  <text x="780" y="105" text-anchor="middle" fill="#4a4a4a" font-size="14" font-weight="700" letter-spacing="1.5">FRONTEND</text>

  <!-- === AGENT COLUMN === -->
  <!-- Claude Code -->
  <rect x="60" y="125" width="240" height="70" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="180" y="155" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">Claude Code</text>
  <text x="180" y="177" text-anchor="middle" fill="#4a4a4a" font-size="13">or any MCP-capable agent</text>

  <!-- /mds commands -->
  <rect x="60" y="210" width="240" height="60" rx="10" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="237" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">/mds:* Commands</text>
  <text x="180" y="258" text-anchor="middle" fill="#4a4a4a" font-size="12">Workspace orchestration</text>

  <!-- Critics -->
  <rect x="60" y="285" width="240" height="60" rx="10" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="312" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Critics</text>
  <text x="180" y="333" text-anchor="middle" fill="#4a4a4a" font-size="12">Vision · Design · Consistency</text>

  <!-- CLI -->
  <rect x="60" y="360" width="240" height="50" rx="8" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="387" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">CLI (medesign)</text>
  <text x="180" y="404" text-anchor="middle" fill="#4a4a4a" font-size="11">Thin client · Gates invoke</text>

  <!-- Gates -->
  <rect x="60" y="425" width="240" height="50" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5" stroke-dasharray="4,3" filter="url(#shadow)"/>
  <text x="180" y="452" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">scripts/gates/</text>
  <text x="180" y="469" text-anchor="middle" fill="#4a4a4a" font-size="11">lint.sh · visual.sh · build.sh</text>

  <!-- Arrow: Agent → Backend -->
  <line x1="300" y1="160" x2="335" y2="160" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- === BACKEND COLUMN === -->
  <rect x="360" y="125" width="240" height="70" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="480" y="155" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">MCP Server</text>
  <text x="480" y="177" text-anchor="middle" fill="#4a4a4a" font-size="13">Tool surface for agents</text>

  <rect x="360" y="210" width="240" height="60" rx="10" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="237" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Prompt Composer</text>
  <text x="480" y="258" text-anchor="middle" fill="#4a4a4a" font-size="12">DESIGN.md + tokens + rules</text>

  <rect x="360" y="285" width="240" height="60" rx="10" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="312" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Consistency Lint</text>
  <text x="480" y="333" text-anchor="middle" fill="#4a4a4a" font-size="12">Token contract · Anti-slop</text>

  <rect x="360" y="360" width="240" height="60" rx="10" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="387" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Visual Test</text>
  <text x="480" y="408" text-anchor="middle" fill="#4a4a4a" font-size="12">Playwright + pixelmatch</text>

  <rect x="360" y="435" width="240" height="40" rx="8" fill="#4a4a4a" filter="url(#shadow)"/>
  <text x="480" y="461" text-anchor="middle" fill="#f8f6f3" font-size="14" font-weight="700">Critique Gate + Capture</text>

  <!-- Arrow: Backend → Frontend -->
  <line x1="600" y1="160" x2="635" y2="160" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- === FRONTEND COLUMN === -->
  <rect x="660" y="125" width="240" height="70" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="780" y="155" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">Storybook</text>
  <text x="780" y="177" text-anchor="middle" fill="#4a4a4a" font-size="13">HMR · Live preview</text>

  <rect x="660" y="210" width="240" height="60" rx="10" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="780" y="237" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">medesign Addon</text>
  <text x="780" y="258" text-anchor="middle" fill="#4a4a4a" font-size="12">Chat · Scores · Diff · Capture</text>

  <!-- Feedback arrow -->
  <path d="M780 270 C780 510, 180 510, 180 430" stroke="#9a9a9a" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-feedback)"/>
  <rect x="370" y="518" width="220" height="22" rx="4" fill="#f8f6f3" fill-opacity="0.95"/>
  <text x="480" y="533" text-anchor="middle" fill="#9a9a9a" font-size="12" font-weight="500">feedback (lint + scores + human)</text>

  <!-- ===== BOTTOM ROW ===== -->
  <rect x="40" y="515" width="440" height="80" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="40" y="515" width="440" height="4" rx="2" fill="#4a4a4a"/>
  <text x="260" y="545" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Design Systems</text>
  <text x="260" y="568" text-anchor="middle" fill="#4a4a4a" font-size="12">DESIGN.md · tokens.css · code/ primitives</text>
  <text x="260" y="585" text-anchor="middle" fill="#4a4a4a" font-size="12">Knowledge graph (graph.json)</text>

  <rect x="500" y="515" width="420" height="80" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5" stroke-dasharray="6,4" filter="url(#shadow)"/>
  <rect x="500" y="515" width="420" height="4" rx="2" fill="#4a4a4a"/>
  <text x="710" y="545" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Generated Components</text>
  <text x="710" y="568" text-anchor="middle" fill="#4a4a4a" font-size="12">React + Tailwind · src/generated/</text>
  <text x="710" y="585" text-anchor="middle" fill="#4a4a4a" font-size="12">→ Captured: src/components/</text>

  <!-- Backend → Design Systems -->
  <path d="M480 435 C480 480, 260 480, 260 512" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow)"/>
</svg>