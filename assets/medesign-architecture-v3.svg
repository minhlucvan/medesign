  <rect x="680" y="140" width="210" height="60" rx="8" fill="#9dd4c7" fill-opacity="0.2" stroke="#4a4a4a" stroke-width="2" filter="url(#s)"/>
  <text x="785" y="166" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Storybook</text>
  <text x="785" y="186" text-anchor="middle" fill="#5a5a5a" font-size="12">HMR · Live component preview</text>

  <rect x="680" y="215" width="210" height="65" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5" filter="url(#s)"/>
  <text x="785" y="240" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">medesign Addon</text>
  <text x="785" y="260" text-anchor="middle" fill="#5a5a5a" font-size="12">Chat · Scores</text>
  <text x="785" y="276" text-anchor="middle" fill="#5a5a5a" font-size="12">Visual Diff · Capture</text>

  <!-- === ARROWS: Pipeline === -->
  <line x1="300" y1="170" x2="325" y2="170" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="630" y1="170" x2="675" y2="170" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- === FEEDBACK LOOP === -->
  <path d="M785 280 C785 420, 260 420, 175 340" stroke="#9a9a9a" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arr-fb)"/>
  <rect x="370" y="428" width="220" height="22" rx="4" fill="#f8f6f3" fill-opacity="0.95"/>
  <text x="480" y="443" text-anchor="middle" fill="#9a9a9a" font-size="12" font-weight="500">FEEDBACK (lint + visual diff + scores)</text>

  <!-- ═══ ROW 2: INFRASTRUCTURE ═══ -->
  <rect x="50" y="420" width="430" height="95" rx="10" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#s)"/>
  <rect x="50" y="420" width="430" height="4" rx="2" fill="#4a4a4a"/>
  <text x="265" y="455" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Design Systems</text>
  <text x="265" y="478" text-anchor="middle" fill="#5a5a5a" font-size="13">DESIGN.md contract · tokens.css · code/ primitives</text>
  <text x="265" y="498" text-anchor="middle" fill="#5a5a5a" font-size="13">Knowledge graph (graph.json) · Prebuilt bases (open-design)</text>

  <rect x="500" y="420" width="410" height="95" rx="10" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" stroke-dasharray="6,4" filter="url(#s)"/>
  <rect x="500" y="420" width="410" height="4" rx="2" fill="#4a4a4a"/>
  <text x="705" y="455" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Generated Components</text>
  <text x="705" y="478" text-anchor="middle" fill="#5a5a5a" font-size="13">React + Tailwind · src/generated/ · .stories.tsx</text>
  <text x="705" y="498" text-anchor="middle" fill="#5a5a5a" font-size="13">Capture → src/components/ (git-tracked, reusable)</text>

  <!-- Backend → Design Systems arrow -->
  <path d="M480 345 C480 380, 265 380, 265 418" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arr)"/>
