  <text x="412" y="257" text-anchor="middle" fill="#5a5a5a" font-size="11">Token · Anti-slop</text>

  <rect x="485" y="215" width="125" height="50" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5" filter="url(#s)"/>
  <text x="547" y="240" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Visual Test</text>
  <text x="547" y="257" text-anchor="middle" fill="#5a5a5a" font-size="11">Playwright + diff</text>

  <!-- Prompt Composer + Graph row -->
  <rect x="350" y="280" width="125" height="50" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5" filter="url(#s)"/>
  <text x="412" y="305" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Prompt Composer</text>
  <text x="412" y="322" text-anchor="middle" fill="#5a5a5a" font-size="11">DESIGN.md + tokens</text>

  <rect x="485" y="280" width="125" height="50" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5" filter="url(#s)"/>
  <text x="547" y="305" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Knowledge Graph</text>
  <text x="547" y="322" text-anchor="middle" fill="#5a5a5a" font-size="11">Impact · Where-to-fix</text>

  <!-- Critique Gate + Capture -->
  <rect x="350" y="345" width="260" height="30" rx="6" fill="#4a4a4a" filter="url(#s)"/>
  <text x="480" y="366" text-anchor="middle" fill="#f8f6f3" font-size="13" font-weight="700">Critique Gate + Capture</text>

