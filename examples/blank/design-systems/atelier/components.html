<!--
  Atelier static fixture — a quick visual reference for the primitives, using token roles.
  The canonical, reusable implementations live in code/. This file is preview/legacy only.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="tokens.css" />
    <style>
      body { background: var(--color-surface); color: var(--color-text); font-family: var(--font-sans); margin: 0; padding: 48px; }
      h1 { font-family: var(--font-display); font-weight: 500; font-size: 44px; letter-spacing: -0.4px; margin: 0 0 24px; }
      .eyebrow { text-transform: uppercase; font-size: 12px; font-weight: 600; letter-spacing: 0.12em; color: var(--color-text-muted); }
      .btn { display: inline-flex; align-items: center; border-radius: var(--radius); padding: 12px 20px; font-weight: 500; border: 0; cursor: pointer; }
      .btn-primary { background: var(--color-accent); color: #fff; }
      .btn-primary:hover { background: var(--color-accent-hover); }
      .btn-secondary { background: transparent; color: var(--color-text); border: 1px solid var(--color-border); }
      .card { background: var(--color-surface-raised); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-raised); max-width: 320px; margin-top: 24px; }
      .badge { display: inline-flex; align-items: center; border-radius: var(--radius-pill); padding: 2px 10px; font-size: 12px; font-weight: 600; background: #f3efe8; color: var(--color-text-muted); }
      .badge-accent { background: var(--color-accent); color: #fff; }
      input { background: var(--color-surface-raised); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 10px 12px; font: inherit; width: 100%; box-sizing: border-box; }
    </style>
  </head>
  <body>
    <p class="eyebrow">Atelier</p>
    <h1>An editorial design system</h1>
    <button class="btn btn-primary">Primary action</button>
    <button class="btn btn-secondary">Secondary</button>
    <span class="badge badge-accent">New</span>
    <span class="badge">Draft</span>
    <div class="card">
      <p>Subscribe to the journal</p>
      <input placeholder="you@studio.com" />
    </div>
  </body>
</html>
