<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" fill="none">
  <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }</style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5a5a5a"/>
    </marker>
    <marker id="arrow-feedback" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#9a9a9a"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000010"/></filter>
  </defs>
  <rect width="960" height="300" rx="12" fill="#f8f6f3"/>
  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="700" letter-spacing="1">END-TO-END FLOW</text>
  <line x1="340" y1="50" x2="620" y2="50" stroke="#d8d4ce" stroke-width="1"/>

  <!-- Helper: arrow function -->

  <!-- 1. Idea -->
  <rect x="40" y="100" width="130" height="110" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="105" y="145" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">Idea / Change</text>
  <text x="105" y="167" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">Request</text>
  <text x="105" y="190" text-anchor="middle" fill="#4a4a4a" font-size="13">You describe what</text>
  <text x="105" y="206" text-anchor="middle" fill="#4a4a4a" font-size="13">you want to build</text>

  <!-- Arrow -->
  <line x1="175" y1="155" x2="215" y2="155" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 2. Agent -->
  <rect x="220" y="90" width="140" height="130" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="290" y="130" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">Agent</text>
  <text x="290" y="152" text-anchor="middle" fill="#4a4a4a" font-size="13">Claude Code</text>
  <text x="290" y="170" text-anchor="middle" fill="#4a4a4a" font-size="13">or any MCP agent</text>
  <text x="290" y="192" text-anchor="middle" fill="#4a4a4a" font-size="13">Reads DESIGN.md</text>
  <text x="290" y="210" text-anchor="middle" fill="#4a4a4a" font-size="13">+ tokens + primitives</text>

  <!-- Arrow -->
  <line x1="365" y1="155" x2="405" y2="155" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 3. Backend Engine -->
  <rect x="410" y="70" width="180" height="170" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="500" y="105" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">Backend Engine</text>
  <text x="500" y="128" text-anchor="middle" fill="#4a4a4a" font-size="13">MCP Server</text>
  <text x="500" y="148" text-anchor="middle" fill="#4a4a4a" font-size="13">Prompt Composer</text>
  <text x="500" y="168" text-anchor="middle" fill="#4a4a4a" font-size="13">Consistency Lint</text>
  <text x="500" y="188" text-anchor="middle" fill="#4a4a4a" font-size="13">Visual Test</text>
  <text x="500" y="208" text-anchor="middle" fill="#4a4a4a" font-size="13">Critique Gate</text>
  <text x="500" y="228" text-anchor="middle" fill="#4a4a4a" font-size="13">Knowledge Graph</text>

  <!-- Arrow -->
  <line x1="595" y1="155" x2="635" y2="155" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 4. Storybook -->
  <rect x="640" y="90" width="140" height="130" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="710" y="130" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">Storybook</text>
  <text x="710" y="152" text-anchor="middle" fill="#4a4a4a" font-size="13">Live HMR</text>
  <text x="710" y="170" text-anchor="middle" fill="#4a4a4a" font-size="13">medesign Addon</text>
  <text x="710" y="192" text-anchor="middle" fill="#4a4a4a" font-size="13">Chat · Scores</text>
  <text x="710" y="210" text-anchor="middle" fill="#4a4a4a" font-size="13">Diff · Capture</text>

  <!-- Arrow -->
  <line x1="785" y1="155" x2="825" y2="155" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 5. Your Repo -->
  <rect x="830" y="90" width="100" height="130" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5" stroke-dasharray="6,4" filter="url(#shadow)"/>
  <text x="880" y="140" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">Your</text>
  <text x="880" y="160" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">Repo</text>
  <text x="880" y="185" text-anchor="middle" fill="#4a4a4a" font-size="11">git-tracked</text>
  <text x="880" y="200" text-anchor="middle" fill="#4a4a4a" font-size="11">components</text>

  <!-- Feedback loop -->
  <path d="M710 220 C710 265, 290 265, 290 225" stroke="#9a9a9a" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-feedback)"/>
  <rect x="380" y="252" width="240" height="24" rx="4" fill="#f8f6f3" fill-opacity="0.95"/>
  <text x="500" y="268" text-anchor="middle" fill="#9a9a9a" font-size="13" font-weight="500">FEEDBACK · lint + visual diff + scores</text>
</svg>