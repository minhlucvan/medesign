<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" fill="none">
  <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }</style>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5a5a5a"/>
    </marker>
    <marker id="arr-fb" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#9a9a9a"/>
    </marker>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0000000a"/></filter>
  </defs>

  <rect width="960" height="540" rx="14" fill="#f8f6f3"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="700" letter-spacing="1.5">SYSTEM ARCHITECTURE</text>
  <line x1="340" y1="52" x2="620" y2="52" stroke="#ddd" stroke-width="1"/>

  <!-- ═══ ROW 1: CORE PIPELINE ═══ -->
  <!-- Column backgrounds -->
  <rect x="50" y="80" width="250" height="310" rx="10" fill="none" stroke="#e0ddd8" stroke-width="1"/>
  <rect x="330" y="80" width="300" height="310" rx="10" fill="none" stroke="#e0ddd8" stroke-width="1"/>
  <rect x="660" y="80" width="250" height="310" rx="10" fill="none" stroke="#e0ddd8" stroke-width="1"/>

  <!-- Column headers -->
  <rect x="50" y="80" width="250" height="40" rx="10" fill="#9dd4c7"/>
  <rect x="50" y="100" width="250" height="20" fill="#9dd4c7"/>
  <text x="175" y="106" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="700" letter-spacing="1">AGENT</text>

  <rect x="330" y="80" width="300" height="40" rx="10" fill="#4a4a4a"/>
  <rect x="330" y="100" width="300" height="20" fill="#4a4a4a"/>
  <text x="480" y="106" text-anchor="middle" fill="#f8f6f3" font-size="14" font-weight="700" letter-spacing="1">BACKEND ENGINE</text>

  <rect x="660" y="80" width="250" height="40" rx="10" fill="#9dd4c7"/>
  <rect x="660" y="100" width="250" height="20" fill="#9dd4c7"/>
  <text x="785" y="106" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="700" letter-spacing="1">FRONTEND</text>

  <!-- === AGENT ITEMS === -->
  <!-- Primary: Claude Code -->
  <rect x="70" y="140" width="210" height="60" rx="8" fill="#9dd4c7" fill-opacity="0.2" stroke="#4a4a4a" stroke-width="2" filter="url(#s)"/>
  <text x="175" y="166" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">Claude Code</text>
  <text x="175" y="186" text-anchor="middle" fill="#5a5a5a" font-size="12">or any MCP agent</text>

  <!-- Workspace -->
  <rect x="70" y="215" width="210" height="50" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5" filter="url(#s)"/>
  <text x="175" y="240" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">/mds:* Workspace</text>
  <text x="175" y="257" text-anchor="middle" fill="#5a5a5a" font-size="11">Commands · Critics · Skills</text>

  <!-- CLI -->
  <rect x="70" y="280" width="210" height="50" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5" filter="url(#s)"/>
  <text x="175" y="305" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">CLI</text>
  <text x="175" y="322" text-anchor="middle" fill="#5a5a5a" font-size="11">Thin client · Gates</text>

