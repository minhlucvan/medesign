<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <rect width="1200" height="400" rx="16" fill="#FAF8F5"/>

  <!-- Grid pattern (design system foundation) -->
  <g opacity="0.06">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#1A1714" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#1A1714" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#1A1714" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#1A1714" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#1A1714" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="400" stroke="#1A1714" stroke-width="0.5"/>
  </g>

  <!-- Right side: abstract design-engineering motif -->
  <!-- Node circles representing the agent loop -->
  <g transform="translate(680, 80)">
    <!-- Connection arcs -->
    <path d="M80 120 C160 60, 280 60, 360 120" stroke="#B4532A" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3"/>
    <path d="M360 120 C440 180, 440 260, 360 320" stroke="#B4532A" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3"/>
    <path d="M360 320 C280 380, 160 380, 80 320" stroke="#B4532A" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3"/>
    <path d="M80 320 C0 260, 0 180, 80 120" stroke="#B4532A" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3"/>

    <!-- Component box (top) -->
    <rect x="120" y="80" width="80" height="60" rx="6" fill="#B4532A" fill-opacity="0.08" stroke="#B4532A" stroke-width="1.5"/>
    <text x="160" y="115" text-anchor="middle" fill="#B4532A" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">COMPONENT</text>

    <!-- Storybook box (right) -->
    <rect x="320" y="100" width="80" height="60" rx="6" fill="#B4532A" fill-opacity="0.08" stroke="#B4532A" stroke-width="1.5"/>
    <text x="360" y="135" text-anchor="middle" fill="#B4532A" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">STORYBOOK</text>

    <!-- Agent node (bottom) -->
    <rect x="120" y="300" width="80" height="60" rx="6" fill="#B4532A" fill-opacity="0.08" stroke="#B4532A" stroke-width="1.5"/>
    <text x="160" y="335" text-anchor="middle" fill="#B4532A" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">AGENT</text>

    <!-- Design System box (left) -->
    <rect x="20" y="100" width="80" height="60" rx="6" fill="#1A1714" fill-opacity="0.06" stroke="#1A1714" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="60" y="135" text-anchor="middle" fill="#1A1714" font-family="system-ui, sans-serif" font-size="11" font-weight="500" letter-spacing="1">DS</text>

    <!-- Bottom decorative bar -->
    <rect x="80" y="220" width="240" height="2" rx="1" fill="#B4532A" fill-opacity="0.15"/>
  </g>

  <!-- Left side: Brand -->
  <g transform="translate(80, 120)">
    <!-- Small decorative mark -->
    <rect x="0" y="0" width="32" height="4" rx="2" fill="#B4532A"/>

    <!-- Brand name -->
    <text x="0" y="60" fill="#1A1714" font-family="system-ui, sans-serif" font-size="48" font-weight="700" letter-spacing="-1">
      medesign
    </text>

    <!-- Tagline -->
    <text x="0" y="95" fill="#6B645C" font-family="system-ui, sans-serif" font-size="20" font-weight="400" letter-spacing="-0.2">
      Design Engineering for the agent era
    </text>

    <!-- Subtitle / description -->
    <text x="0" y="135" fill="#8A8078" font-family="system-ui, sans-serif" font-size="13" font-weight="400" letter-spacing="0.3">
      Agent-driven design · Storybook · Systematic components
    </text>

    <!-- Bottom accent line -->
    <rect x="0" y="160" width="320" height="1" rx="1" fill="#E6E1D8"/>
  </g>

  <!-- Bottom-left accent mark -->
  <rect x="80" y="355" width="8" height="8" rx="2" fill="#B4532A" fill-opacity="0.3"/>
  <rect x="92" y="355" width="8" height="8" rx="2" fill="#B4532A" fill-opacity="0.15"/>
  <rect x="104" y="355" width="8" height="8" rx="2" fill="#B4532A" fill-opacity="0.08"/>
</svg>
